spring.application.name=careerai-backend
server.port=8080

management.endpoints.web.exposure.include=health,info

telegram.bot.token=${TELEGRAM_BOT_TOKEN}

# Active LLM provider: gemini OR groq (GEMINI or GROQ)
llm.provider=GEMINI

# GEMINI
gemini.api.keys=${GEMINI_API_KEYS}
gemini.api.model=gemini-3.1-flash-lite
#gemini.api.model=gemini-3.5-flash
#gemini.api.model=gemini-2.5-flash-lite
#gemini.api.model=gemini-2.5-flash
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models

# GROQ
groq.api.base-url=https://api.groq.com/openai/v1

# TOP
groq.api.model=llama-3.1-8b-instant

#groq.api.model=qwen/qwen3-32b

# ?TOP?
#groq.api.model=llama-3.3-70b-versatile

groq.api.key=${GROQ_API_KEY:}
groq.api.connect-timeout-seconds=5
groq.api.read-timeout-seconds=25
groq.api.temperature=0.5
groq.api.max-output-tokens=1200

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/careerai}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#logging.level.org.flywaydb=DEBUG