spring.application.name=careerai-backend
server.port=8080

management.endpoints.web.exposure.include=health,info

telegram.bot.token=${TELEGRAM_BOT_TOKEN}

# Active LLM provider: gemini OR groq (GEMINI or GROQ)
llm.provider=GEMINI

# GEMINI
gemini.api.keys=${GEMINI_API_KEYS}
gemini.api.model=gemini-3.1-flash-lite
#gemini.api.model=gemini-3.5-flash
#gemini.api.model=gemini-2.5-flash-lite
#gemini.api.model=gemini-2.5-flash
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models

# GROQ
groq.api.base-url=https://api.groq.com/openai/v1

# TOP
groq.api.model=llama-3.1-8b-instant

#groq.api.model=qwen/qwen3-32b

# ?TOP?
#groq.api.model=llama-3.3-70b-versatile

groq.api.key=${GROQ_API_KEY:}
groq.api.connect-timeout-seconds=5
groq.api.read-timeout-seconds=25
groq.api.temperature=0.5
groq.api.max-output-tokens=1200

#spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/careerai}
#spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/careerai_semantic}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/careerai_freshness}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#logging.level.org.flywaydb=DEBUG

# SEMANTIC SEARCH
semantic-search.enabled=${SEMANTIC_SEARCH_ENABLED:true}
semantic-search.embedding-model=gemini-embedding-2
semantic-search.output-dimensions=768

semantic-search.index-faq-on-startup=${SEMANTIC_SEARCH_INDEX_FAQ_ON_STARTUP:false}
semantic-search.index-channel-posts-on-startup=${SEMANTIC_SEARCH_INDEX_CHANNEL_POSTS_ON_STARTUP:false}

semantic-search.faq-max-results=${SEMANTIC_SEARCH_FAQ_MAX_RESULTS:4}
semantic-search.faq-min-similarity=${SEMANTIC_SEARCH_FAQ_MIN_SIMILARITY:0.45}

semantic-search.channel-max-results=${SEMANTIC_SEARCH_CHANNEL_MAX_RESULTS:6}
semantic-search.channel-min-similarity=${SEMANTIC_SEARCH_CHANNEL_MIN_SIMILARITY:0.45}

semantic-search.channel-index-limit=${SEMANTIC_SEARCH_CHANNEL_INDEX_LIMIT:100}

# APPLICATION TIME
careerai.time-zone=Asia/Almaty

# CHANNEL POST FRESHNESS
channel-post-freshness.recalculate-on-startup=${CHANNEL_POST_FRESHNESS_RECALCULATE_ON_STARTUP:false}

channel-post-freshness.scheduled-recalculation-enabled=${CHANNEL_POST_FRESHNESS_SCHEDULED_RECALCULATION_ENABLED:true}

channel-post-freshness.recalculation-cron=${CHANNEL_POST_FRESHNESS_RECALCULATION_CRON:0 5 * * * *}

channel-post-freshness.expiration-sweep-enabled=true
channel-post-freshness.expiration-sweep-cron=0 * * * * *

# TELEGRAM CHANNEL POST RELATIONS
channel-post-relations.reconciliation-enabled=true
channel-post-relations.reconciliation-cron=0 */10 * * * *